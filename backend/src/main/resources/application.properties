spring.application.name=unified-api-manager
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

# Defaults to H2 in-memory for local dev. Set SPRING_DATASOURCE_* env vars
# (see docker-compose.yml) to point at PostgreSQL in Docker/production.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:unifiedapidb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=${JWT_SECRET:change-me-to-a-256-bit-secret-key-for-production-use}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# API Keys
api.key.prefix=uam_

# OAuth2 (fill in real credentials from developer portals)
spring.security.oauth2.client.registration.linkedin.client-id=${LINKEDIN_CLIENT_ID:your-linkedin-client-id}
spring.security.oauth2.client.registration.linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:your-linkedin-client-secret}
spring.security.oauth2.client.registration.linkedin.scope=openid,profile,w_member_social,r_basicprofile
spring.security.oauth2.client.registration.linkedin.client-name=LinkedIn
spring.security.oauth2.client.registration.linkedin.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.linkedin.authorization-grant-type=authorization_code
spring.security.oauth2.client.provider.linkedin.authorization-uri=https://www.linkedin.com/oauth/v2/authorization
spring.security.oauth2.client.provider.linkedin.token-uri=https://www.linkedin.com/oauth/v2/accessToken
spring.security.oauth2.client.provider.linkedin.user-info-uri=https://api.linkedin.com/v2/userinfo
spring.security.oauth2.client.provider.linkedin.user-name-attribute=sub

spring.security.oauth2.client.registration.twitter.client-id=${TWITTER_CLIENT_ID:your-twitter-client-id}
spring.security.oauth2.client.registration.twitter.client-secret=${TWITTER_CLIENT_SECRET:your-twitter-client-secret}
spring.security.oauth2.client.registration.twitter.scope=tweet.read,tweet.write,users.read,offline.access
spring.security.oauth2.client.registration.twitter.client-name=Twitter
spring.security.oauth2.client.registration.twitter.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.twitter.authorization-grant-type=authorization_code
spring.security.oauth2.client.provider.twitter.authorization-uri=https://twitter.com/i/oauth2/authorize
spring.security.oauth2.client.provider.twitter.token-uri=https://api.twitter.com/2/oauth2/token
spring.security.oauth2.client.provider.twitter.user-info-uri=https://api.twitter.com/2/users/me
spring.security.oauth2.client.provider.twitter.user-name-attribute=data

# Webhook async executor
webhook.thread-pool.size=10
webhook.thread-pool.queue=100

# CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
